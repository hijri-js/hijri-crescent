<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>hijri-crescent | Scraper Status</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 2rem 1rem;
    }
    .container { max-width: 720px; margin: 0 auto; }
    header { margin-bottom: 2.5rem; }
    h1 { font-size: 1.5rem; font-weight: 700; color: #f8fafc; margin-bottom: 0.25rem; }
    .subtitle { color: #94a3b8; font-size: 0.875rem; }
    .last-run { color: #64748b; font-size: 0.75rem; margin-top: 0.5rem; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1rem; }
    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 0.75rem;
      padding: 1.25rem;
      display: flex;
      align-items: flex-start;
      gap: 1rem;
    }
    .card.error { border-color: #ef4444; }
    .flag { font-size: 2rem; line-height: 1; flex-shrink: 0; }
    .info { flex: 1; min-width: 0; }
    .country-name { font-weight: 600; font-size: 1rem; color: #f1f5f9; }
    .status-row { display: flex; align-items: center; gap: 0.5rem; margin-top: 0.375rem; }
    .dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
      background: #22c55e;
    }
    .dot.error { background: #ef4444; }
    .status-text { font-size: 0.8125rem; color: #94a3b8; }
    .error-msg { font-size: 0.75rem; color: #f87171; margin-top: 0.375rem; word-break: break-word; }
    .loading { text-align: center; padding: 3rem; color: #64748b; }
    footer {
      margin-top: 3rem; padding-top: 1.5rem;
      border-top: 1px solid #1e293b;
      display: flex; gap: 1.5rem; flex-wrap: wrap;
      font-size: 0.8125rem; color: #64748b;
    }
    footer a { color: #64748b; text-decoration: none; }
    footer a:hover { color: #94a3b8; }
    .refresh-note { color: #475569; font-size: 0.75rem; margin-top: 0.75rem; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🌙 hijri-crescent | Scraper Status</h1>
      <p class="subtitle">Official moon-sighted Hijri dates scraped 3x daily from government sources</p>
      <p class="last-run" id="lastRun">Loading...</p>
      <p class="refresh-note">Auto-refreshes every 5 minutes</p>
    </header>
    <div class="grid" id="grid">
      <div class="loading">Fetching status...</div>
    </div>
    <footer>
      <a href="https://www.npmjs.com/package/hijri-crescent">npm</a>
      <a href="https://github.com/hijri-js/hijri-crescent">GitHub</a>
      <a href="https://github.com/hijri-js/hijri-crescent/blob/main/data/status.json">status.json</a>
    </footer>
  </div>

  <script>
    const STATUS_URL = 'https://raw.githubusercontent.com/hijri-js/hijri-crescent/main/data/status.json';

    const COUNTRIES = {
      EG: { name: 'Egypt', flag: '🇪🇬' },
      SA: { name: 'Saudi Arabia', flag: '🇸🇦' },
      AE: { name: 'UAE', flag: '🇦🇪' },
      KW: { name: 'Kuwait', flag: '🇰🇼' },
      JO: { name: 'Jordan', flag: '🇯🇴' },
    };

    function relativeTime(iso) {
      if (!iso) return 'never';
      const diff = Date.now() - new Date(iso).getTime();
      const h = Math.floor(diff / 3600000);
      const m = Math.floor((diff % 3600000) / 60000);
      if (h > 48) return `${Math.floor(h / 24)} days ago`;
      if (h > 0) return `${h}h ${m}m ago`;
      return `${m}m ago`;
    }

    async function load() {
      try {
        const res = await fetch(STATUS_URL + '?t=' + Date.now());
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();

        document.getElementById('lastRun').textContent =
          'Last scrape: ' + relativeTime(data.lastRunAt) + (data.lastRunAt ? ` (${new Date(data.lastRunAt).toUTCString()})` : '');

        const grid = document.getElementById('grid');
        grid.innerHTML = '';

        for (const [code, meta] of Object.entries(COUNTRIES)) {
          const country = data.countries?.[code];
          const isError = !country || country.status === 'error';
          const card = document.createElement('div');
          card.className = 'card' + (isError ? ' error' : '');

          card.innerHTML = `
            <div class="flag">${meta.flag}</div>
            <div class="info">
              <div class="country-name">${meta.name} (${code})</div>
              <div class="status-row">
                <div class="dot ${isError ? 'error' : ''}"></div>
                <div class="status-text">
                  ${isError ? 'Error' : 'Online'}, updated ${relativeTime(country?.cachedAt)}
                </div>
              </div>
              ${isError && country?.error ? `<div class="error-msg">${country.error}</div>` : ''}
            </div>
          `;
          grid.appendChild(card);
        }
      } catch (e) {
        document.getElementById('grid').innerHTML =
          `<div class="loading">Failed to load status: ${e.message}</div>`;
      }
    }

    load();
    setInterval(load, 5 * 60 * 1000);
  </script>
</body>
</html>
